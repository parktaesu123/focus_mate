services:
  focus-mate:
    build:
      context: .
      dockerfile: Dockerfile
    image: focus-mate:latest
    container_name: focus-mate
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "8787"
      NODE_ENV: production
    ports:
      - "127.0.0.1:${APP_PORT:-8787}:8787"
    volumes:
      - focus_mate_data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8787/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  focus_mate_data:
